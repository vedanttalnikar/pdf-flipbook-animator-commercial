name: Build Windows Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .
        pip install pyinstaller
    
    - name: Build executable
      run: python build_executable.py
    
    - name: Get version
      id: get_version
      shell: pwsh
      run: |
        if ("${{ github.ref }}" -match "refs/tags/(.*)") {
          $version = $matches[1]
        } else {
          $version = "dev"
        }
        echo "version=$version" >> $env:GITHUB_OUTPUT
    
    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: |
          pdf-flipbook-windows.zip
        body: |
          ## PDF Flipbook Animator ${{ steps.get_version.outputs.version }}
          
          ### Windows Executable Release
          
          **No Python Required!** Just download, extract, and run.
          
          #### What's Included:
          - ✅ Standalone Windows executable
          - ✅ All dependencies bundled
          - ✅ Ready to use immediately
          
          #### Quick Start:
          1. Download `pdf-flipbook-windows.zip`
          2. Extract to any folder
          3. Open Command Prompt in that folder
          4. Run: `pdf-flipbook.exe convert your-document.pdf`
          
          #### System Requirements:
          - Windows 10 or later
          - 64-bit system
          
          #### File Size:
          Approximately 50-70 MB (includes all dependencies)
          
          See [README](https://github.com/vedanttalnikar/pdf-flipbook-animator-commercial/blob/main/README.md) for full documentation.
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Upload artifact
      uses: actions/upload-artifact@v3
      with:
        name: pdf-flipbook-windows
        path: pdf-flipbook-windows.zip
        retention-days: 30
