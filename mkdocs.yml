site_name: PDF Flipbook Animator
site_description: Convert PDFs to animated flipbook web pages with realistic page-turning effects
site_url: https://vedanttalnikar.github.io/pdf-flipbook-animator-commercial
repo_url: https://github.com/vedanttalnikar/pdf-flipbook-animator-commercial
repo_name: vedanttalnikar/pdf-flipbook-animator-commercial
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    # Light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link
  icon:
    repo: fontawesome/brands/github

nav:
  - Home: index.md
  - Getting Started:
      - Installation: installation.md
      - Quick Start: quickstart.md
  - User Guide:
      - Basic Usage: usage/basic.md
      - Advanced Options: usage/advanced.md
      - Batch Processing: usage/batch.md
      - Hosting Your Flipbook: usage/hosting.md
  - Examples:
      - Gallery: examples/gallery.md
  - API Reference: api/reference.md
  - Contributing: contributing.md
  - Changelog: changelog.md

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
            show_root_full_path: false
            members_order: source

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/vedanttalnikar/pdf-flipbook-animator-commercial
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/pdf-flipbook-animator/
  version:
    provider: mike
